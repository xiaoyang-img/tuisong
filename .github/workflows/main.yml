name: weixin
on:
  workflow_dispatch:
  schedule: 
    # 代表国际标准时间23点0分，北京时间需要+8小时，代表北京时间上午7点运行
    - cron: '0 23 * * *'

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4  # 建议也升级到 v4
    
      - name: Set up Python 3.9
        uses: actions/setup-python@v5  # 升级到 v5
        with:
          python-version: '3.9'      # 去掉补丁号，使用 3.9.x 最新版
      
      - name: Set timezone
        run: |
          cp /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
      
      - name: install pip packages
        run: |
          python -m pip install --upgrade pip
          pip3 install -r requirements.txt
      
      - name: weixin
        run: |
          python3 main.py
